name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  portal:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build portal with Graphify artifacts
        run: npm run build
